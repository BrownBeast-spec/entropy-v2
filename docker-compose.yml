version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: entropy
      POSTGRES_PASSWORD: entropy
      POSTGRES_DB: entropy
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    depends_on:
      - postgres

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://entropy:entropy@postgres:5432/entropy

  client:
    build: ./client
    ports:
      - "5173:5173"

volumes:
  postgres_data:
